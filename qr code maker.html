<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Studio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- QR Code Styling Engine -->
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    
    <style>
        /* Custom pattern for transparent background visualization */
        .checkerboard {
            background-image: repeating-linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), 
                              repeating-linear-gradient(45deg, #000 25%, #fff 25%, #fff 75%, #000 75%, #000);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
        }
        
        /* Hide element utility */
        .hidden-el { display: none !important; }
    </style>
</head>
<body class="bg-white text-slate-800 font-sans selection:bg-blue-200">

    <div class="flex flex-col lg:flex-row min-h-screen">
        
        <!-- LEFT PANEL: Scrollable Controls -->
        <div class="flex-1 p-6 lg:p-12 overflow-y-auto">
            <div class="max-w-xl mx-auto space-y-10">
                
                <header>
                    <h1 class="text-3xl font-bold text-slate-900 flex items-center gap-3">
                        <i data-lucide="qr-code" class="text-blue-600 w-8 h-8"></i>
                        QR Studio
                    </h1>
                    <p class="text-slate-500 mt-2 text-sm">Create clean, custom QR codes. Rendered securely on your device.</p>
                </header>

                <!-- 1. URL Input -->
                <section class="space-y-3">
                    <label class="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                        <i data-lucide="link" class="w-4 h-4"></i> Destination URL
                    </label>
                    <input type="text" id="urlInput" value="https://your-brand.com" placeholder="https://example.com"
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-700 font-medium" />
                </section>

                <!-- 2. Shapes & Patterns -->
                <section class="space-y-4">
                    <label class="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                        <i data-lucide="settings" class="w-4 h-4"></i> Patterns & Shapes
                    </label>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div class="flex flex-col gap-2">
                            <span class="text-xs text-slate-500">Body Pattern</span>
                            <select id="dotsType" class="px-3 py-2.5 rounded-lg bg-slate-50 border border-slate-200 text-sm focus:outline-none focus:border-blue-500 cursor-pointer">
                                <option value="rounded" selected>Rounded</option>
                                <option value="dots">Dots</option>
                                <option value="classy">Classy</option>
                                <option value="square">Square</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-2">
                            <span class="text-xs text-slate-500">Outer Frame</span>
                            <select id="cornersType" class="px-3 py-2.5 rounded-lg bg-slate-50 border border-slate-200 text-sm focus:outline-none focus:border-blue-500 cursor-pointer">
                                <option value="extra-rounded" selected>Smooth</option>
                                <option value="square">Square</option>
                                <option value="dot">Dot</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-2">
                            <span class="text-xs text-slate-500">Inner Eye</span>
                            <select id="cornersDotType" class="px-3 py-2.5 rounded-lg bg-slate-50 border border-slate-200 text-sm focus:outline-none focus:border-blue-500 cursor-pointer">
                                <option value="dot" selected>Dot</option>
                                <option value="square">Square</option>
                            </select>
                        </div>
                    </div>
                </section>

                <!-- 3. Advanced Colors -->
                <section class="space-y-4">
                    <label class="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                        <i data-lucide="palette" class="w-4 h-4"></i> Colors & Gradients
                    </label>
                    
                    <div class="space-y-4">
                        <!-- Main Pattern Color -->
                        <div class="space-y-3 p-4 bg-slate-50 border border-slate-200 rounded-xl hover:border-blue-200 transition-colors">
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-bold text-slate-500 uppercase">Pattern Color</span>
                                <div class="flex bg-slate-200 rounded-lg p-0.5">
                                    <button id="dotsSolidBtn" class="px-2 py-1 text-[10px] font-bold rounded-md bg-white shadow-sm text-slate-800">Solid</button>
                                    <button id="dotsGradBtn" class="px-2 py-1 text-[10px] font-bold rounded-md text-slate-500">Gradient</button>
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <input type="color" id="dotsColor1" value="#2563eb" class="w-8 h-8 rounded cursor-pointer border-0 p-0 bg-transparent shrink-0" />
                                <div id="dotsColor2Container" class="hidden-el flex items-center gap-3">
                                    <span class="text-slate-400 text-xs italic">to</span>
                                    <input type="color" id="dotsColor2" value="#9333ea" class="w-8 h-8 rounded cursor-pointer border-0 p-0 bg-transparent shrink-0" />
                                </div>
                            </div>
                        </div>

                        <!-- Corners Colors -->
                        <div class="grid grid-cols-2 gap-4">
                            <div class="flex flex-col gap-2 p-4 bg-slate-50 border border-slate-200 rounded-xl hover:border-blue-200 transition-colors">
                                <span class="text-[10px] font-bold text-slate-500 uppercase">Outer Frame</span>
                                <input type="color" id="cornersColor" value="#1e3a8a" class="w-8 h-8 rounded cursor-pointer border-0 p-0 bg-transparent shrink-0" />
                            </div>
                            <div class="flex flex-col gap-2 p-4 bg-slate-50 border border-slate-200 rounded-xl hover:border-blue-200 transition-colors">
                                <span class="text-[10px] font-bold text-slate-500 uppercase">Inner Eye</span>
                                <input type="color" id="cornersDotColor" value="#3b82f6" class="w-8 h-8 rounded cursor-pointer border-0 p-0 bg-transparent shrink-0" />
                            </div>
                        </div>

                        <!-- Background Style -->
                        <div class="space-y-3 p-4 bg-slate-50 border border-slate-200 rounded-xl hover:border-blue-200 transition-colors">
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-bold text-slate-500 uppercase">Background Style</span>
                                <div class="flex items-center gap-3">
                                    <label class="text-[10px] flex items-center gap-1.5 font-bold text-slate-500 cursor-pointer">
                                        <input type="checkbox" id="bgTransparentCheck" class="rounded text-blue-600 focus:ring-blue-500" />
                                        Transparent
                                    </label>
                                    <div id="bgStyleToggles" class="flex bg-slate-200 rounded-lg p-0.5 border-l border-slate-300 pl-0.5">
                                        <button id="bgSolidBtn" class="px-2 py-1 text-[10px] font-bold rounded-md bg-white shadow-sm text-slate-800">Solid</button>
                                        <button id="bgGradBtn" class="px-2 py-1 text-[10px] font-bold rounded-md text-slate-500">Gradient</button>
                                    </div>
                                </div>
                            </div>
                            
                            <div id="bgColorsWrapper" class="flex items-center gap-3 transition-opacity">
                                <input type="color" id="bgColor1" value="#ffffff" class="w-8 h-8 rounded cursor-pointer border-0 p-0 bg-transparent shrink-0" />
                                <div id="bgColor2Container" class="hidden-el flex items-center gap-3">
                                    <span class="text-slate-400 text-xs italic">to</span>
                                    <input type="color" id="bgColor2" value="#f8fafc" class="w-8 h-8 rounded cursor-pointer border-0 p-0 bg-transparent shrink-0" />
                                </div>
                            </div>
                            <div id="bgTransparentMsg" class="hidden-el h-8 flex items-center">
                                <span class="text-xs text-slate-400 italic">Background is completely invisible</span>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 4. Logo -->
                <section class="space-y-3">
                    <label class="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                        <i data-lucide="image" class="w-4 h-4"></i> Center Logo
                    </label>
                    
                    <!-- Upload State -->
                    <div id="logoUploadView" class="relative group">
                        <input type="file" id="logoInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                        <div class="flex flex-col items-center justify-center p-6 border-2 border-dashed border-slate-300 rounded-xl bg-white group-hover:bg-slate-50 transition-colors">
                            <i data-lucide="image" class="text-slate-400 mb-2 w-6 h-6"></i>
                            <span class="text-sm font-medium text-slate-600">Upload Logo</span>
                            <span class="text-xs text-slate-400 mt-1">PNG or JPG</span>
                        </div>
                    </div>

                    <!-- Active State -->
                    <div id="logoActiveView" class="hidden-el space-y-4 p-4 border border-slate-200 rounded-xl bg-slate-50">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <img id="logoPreviewImg" src="" alt="Logo" class="w-10 h-10 object-contain rounded border border-slate-200 bg-white" />
                                <span class="text-sm font-medium text-slate-700">Logo Applied</span>
                            </div>
                            <button id="removeLogoBtn" class="p-2 text-slate-400 hover:text-red-500 bg-white rounded-lg shadow-sm border border-slate-100 transition-colors">
                                <i data-lucide="x" class="w-4 h-4"></i>
                            </button>
                        </div>
                        
                        <!-- Advanced Logo Controls -->
                        <div class="pt-4 border-t border-slate-200 space-y-5">
                            <div class="space-y-2">
                                <div class="flex justify-between items-center">
                                    <span class="text-xs font-bold text-slate-500 flex items-center gap-1">
                                        <i data-lucide="sliders-horizontal" class="w-3 h-3"></i> Logo Scale
                                    </span>
                                    <span id="logoSizeLabel" class="text-xs font-bold text-slate-600">40%</span>
                                </div>
                                <input type="range" id="logoSize" min="0.1" max="0.6" step="0.05" value="0.4"
                                    class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                            </div>
                            
                            <div class="space-y-2">
                                <div class="flex justify-between items-center">
                                    <span class="text-xs font-bold text-slate-500 flex items-center gap-1">
                                        <i data-lucide="sliders-horizontal" class="w-3 h-3"></i> Cutout Margin
                                    </span>
                                    <span id="logoMarginLabel" class="text-xs font-bold text-slate-600">4%</span>
                                </div>
                                <input type="range" id="logoMargin" min="0" max="0.1" step="0.01" value="0.04"
                                    class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>

        <!-- RIGHT PANEL: Sticky Preview & Download -->
        <div class="w-full lg:w-[450px] xl:w-[500px] bg-slate-50 border-t lg:border-t-0 lg:border-l border-slate-200 flex flex-col items-center justify-center p-8 lg:p-12 lg:sticky lg:top-0 lg:h-screen">
            
            <div class="w-full flex flex-col items-center gap-8">
                
                <!-- Locked Size Preview Box -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex items-center justify-center transition-all hover:shadow-md relative overflow-hidden">
                    <!-- Checkerboard background to visualize transparency -->
                    <div id="checkerboardBg" class="hidden-el absolute inset-0 opacity-10 checkerboard"></div>
                    
                    <div id="qrPreviewBox" class="w-[300px] h-[300px] flex items-center justify-center relative z-10">
                        <i id="loadingIcon" data-lucide="loader-2" class="animate-spin text-slate-300 w-8 h-8"></i>
                    </div>
                </div>

                <!-- Export Controls -->
                <div class="w-full max-w-[300px] space-y-6">
                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-bold text-slate-400 uppercase">Export Quality</span>
                            <span id="exportResLabel" class="text-xs font-bold text-slate-600">1000px</span>
                        </div>
                        <input type="range" id="exportRes" min="300" max="2000" step="100" value="1000"
                            class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                    </div>

                    <button id="downloadBtn" class="w-full py-4 rounded-xl font-bold text-white shadow-md hover:shadow-lg bg-blue-600 hover:bg-blue-700 transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i id="downloadIcon" data-lucide="download" class="w-5 h-5"></i>
                        <span id="downloadText">Download Image</span>
                    </button>
                </div>

            </div>
        </div>

    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // State Variables
        let qrEngine = null;
        let isReady = false;
        let currentLogoUrl = null;
        let isDotsGradient = false;
        let isBgGradient = false;
        let isBgTransparent = false;
        let updateTimeout;

        // DOM Elements
        const DOM = {
            url: document.getElementById('urlInput'),
            dotsType: document.getElementById('dotsType'),
            cornersType: document.getElementById('cornersType'),
            cornersDotType: document.getElementById('cornersDotType'),
            
            dotsSolidBtn: document.getElementById('dotsSolidBtn'),
            dotsGradBtn: document.getElementById('dotsGradBtn'),
            dotsColor1: document.getElementById('dotsColor1'),
            dotsColor2: document.getElementById('dotsColor2'),
            dotsColor2Container: document.getElementById('dotsColor2Container'),
            
            cornersColor: document.getElementById('cornersColor'),
            cornersDotColor: document.getElementById('cornersDotColor'),
            
            bgTransparentCheck: document.getElementById('bgTransparentCheck'),
            bgStyleToggles: document.getElementById('bgStyleToggles'),
            bgSolidBtn: document.getElementById('bgSolidBtn'),
            bgGradBtn: document.getElementById('bgGradBtn'),
            bgColor1: document.getElementById('bgColor1'),
            bgColor2: document.getElementById('bgColor2'),
            bgColor2Container: document.getElementById('bgColor2Container'),
            bgColorsWrapper: document.getElementById('bgColorsWrapper'),
            bgTransparentMsg: document.getElementById('bgTransparentMsg'),
            checkerboardBg: document.getElementById('checkerboardBg'),
            
            logoInput: document.getElementById('logoInput'),
            logoUploadView: document.getElementById('logoUploadView'),
            logoActiveView: document.getElementById('logoActiveView'),
            logoPreviewImg: document.getElementById('logoPreviewImg'),
            removeLogoBtn: document.getElementById('removeLogoBtn'),
            logoSize: document.getElementById('logoSize'),
            logoMargin: document.getElementById('logoMargin'),
            logoSizeLabel: document.getElementById('logoSizeLabel'),
            logoMarginLabel: document.getElementById('logoMarginLabel'),
            
            qrPreviewBox: document.getElementById('qrPreviewBox'),
            loadingIcon: document.getElementById('loadingIcon'),
            
            exportRes: document.getElementById('exportRes'),
            exportResLabel: document.getElementById('exportResLabel'),
            downloadBtn: document.getElementById('downloadBtn'),
            downloadIcon: document.getElementById('downloadIcon'),
            downloadText: document.getElementById('downloadText')
        };

        // --- Logic & Configuration ---

        function getQrConfig(size, isExport = false) {
            const config = {
                width: size,
                height: size,
                type: isExport ? 'canvas' : 'svg',
                data: DOM.url.value || 'https://',
                image: currentLogoUrl || '',
                qrOptions: { errorCorrectionLevel: 'H' },
                cornersSquareOptions: { color: DOM.cornersColor.value, type: DOM.cornersType.value },
                cornersDotOptions: { color: DOM.cornersDotColor.value, type: DOM.cornersDotType.value },
                imageOptions: {
                    crossOrigin: 'anonymous',
                    margin: Math.floor(size * parseFloat(DOM.logoMargin.value)),
                    imageSize: parseFloat(DOM.logoSize.value)
                }
            };

            // Pattern Styling
            if (isDotsGradient) {
                config.dotsOptions = {
                    type: DOM.dotsType.value,
                    gradient: {
                        type: 'linear',
                        rotation: Math.PI / 4,
                        colorStops: [
                            { offset: 0, color: DOM.dotsColor1.value }, 
                            { offset: 1, color: DOM.dotsColor2.value }
                        ]
                    }
                };
            } else {
                config.dotsOptions = { type: DOM.dotsType.value, color: DOM.dotsColor1.value };
            }

            // Background Styling
            if (isBgTransparent) {
                config.backgroundOptions = { color: 'rgba(0,0,0,0)' };
            } else if (isBgGradient) {
                config.backgroundOptions = {
                    gradient: {
                        type: 'linear',
                        rotation: Math.PI / 4,
                        colorStops: [
                            { offset: 0, color: DOM.bgColor1.value }, 
                            { offset: 1, color: DOM.bgColor2.value }
                        ]
                    }
                };
            } else {
                config.backgroundOptions = { color: DOM.bgColor1.value };
            }

            return config;
        }

        function triggerUpdate() {
            if (!isReady) return;
            
            // Debounce the update to prevent rendering lag while typing/sliding
            clearTimeout(updateTimeout);
            updateTimeout = setTimeout(() => {
                const config = getQrConfig(300, false);
                if (!qrEngine) {
                    qrEngine = new QRCodeStyling(config);
                    DOM.qrPreviewBox.innerHTML = ''; // Clear loading icon
                    qrEngine.append(DOM.qrPreviewBox);
                } else {
                    qrEngine.update(config);
                }
            }, 200);
        }

        // --- UI State Handlers ---

        function setDotsGradientMode(isGrad) {
            isDotsGradient = isGrad;
            
            // Update Buttons visually
            DOM.dotsSolidBtn.className = !isGrad 
                ? 'px-2 py-1 text-[10px] font-bold rounded-md bg-white shadow-sm text-slate-800'
                : 'px-2 py-1 text-[10px] font-bold rounded-md text-slate-500';
            
            DOM.dotsGradBtn.className = isGrad 
                ? 'px-2 py-1 text-[10px] font-bold rounded-md bg-white shadow-sm text-slate-800'
                : 'px-2 py-1 text-[10px] font-bold rounded-md text-slate-500';

            // Show/Hide Color 2
            if (isGrad) DOM.dotsColor2Container.classList.remove('hidden-el');
            else DOM.dotsColor2Container.classList.add('hidden-el');

            triggerUpdate();
        }

        function setBgGradientMode(isGrad) {
            isBgGradient = isGrad;
            
            DOM.bgSolidBtn.className = !isGrad 
                ? 'px-2 py-1 text-[10px] font-bold rounded-md bg-white shadow-sm text-slate-800'
                : 'px-2 py-1 text-[10px] font-bold rounded-md text-slate-500';
            
            DOM.bgGradBtn.className = isGrad 
                ? 'px-2 py-1 text-[10px] font-bold rounded-md bg-white shadow-sm text-slate-800'
                : 'px-2 py-1 text-[10px] font-bold rounded-md text-slate-500';

            if (isGrad) DOM.bgColor2Container.classList.remove('hidden-el');
            else DOM.bgColor2Container.classList.add('hidden-el');

            triggerUpdate();
        }

        function setBgTransparentMode(isTrans) {
            isBgTransparent = isTrans;
            
            if (isTrans) {
                DOM.bgStyleToggles.classList.add('hidden-el');
                DOM.bgColorsWrapper.classList.add('hidden-el');
                DOM.bgTransparentMsg.classList.remove('hidden-el');
                DOM.checkerboardBg.classList.remove('hidden-el');
            } else {
                DOM.bgStyleToggles.classList.remove('hidden-el');
                DOM.bgColorsWrapper.classList.remove('hidden-el');
                DOM.bgTransparentMsg.classList.add('hidden-el');
                DOM.checkerboardBg.classList.add('hidden-el');
            }
            
            triggerUpdate();
        }

        function updateLogoUI() {
            if (currentLogoUrl) {
                DOM.logoUploadView.classList.add('hidden-el');
                DOM.logoActiveView.classList.remove('hidden-el');
                DOM.logoPreviewImg.src = currentLogoUrl;
            } else {
                DOM.logoUploadView.classList.remove('hidden-el');
                DOM.logoActiveView.classList.add('hidden-el');
                DOM.logoInput.value = ''; // Reset input
            }
            triggerUpdate();
        }

        // --- Event Listeners ---

        // Basic Inputs
        ['input', 'change'].forEach(evt => {
            DOM.url.addEventListener(evt, triggerUpdate);
            DOM.dotsType.addEventListener(evt, triggerUpdate);
            DOM.cornersType.addEventListener(evt, triggerUpdate);
            DOM.cornersDotType.addEventListener(evt, triggerUpdate);
            DOM.dotsColor1.addEventListener(evt, triggerUpdate);
            DOM.dotsColor2.addEventListener(evt, triggerUpdate);
            DOM.cornersColor.addEventListener(evt, triggerUpdate);
            DOM.cornersDotColor.addEventListener(evt, triggerUpdate);
            DOM.bgColor1.addEventListener(evt, triggerUpdate);
            DOM.bgColor2.addEventListener(evt, triggerUpdate);
        });

        // Sliders
        DOM.logoSize.addEventListener('input', (e) => {
            DOM.logoSizeLabel.textContent = `${Math.round(e.target.value * 100)}%`;
            triggerUpdate();
        });
        
        DOM.logoMargin.addEventListener('input', (e) => {
            DOM.logoMarginLabel.textContent = `${Math.round(e.target.value * 100)}%`;
            triggerUpdate();
        });

        DOM.exportRes.addEventListener('input', (e) => {
            DOM.exportResLabel.textContent = `${e.target.value}px`;
        });

        // Mode Toggles
        DOM.dotsSolidBtn.addEventListener('click', () => setDotsGradientMode(false));
        DOM.dotsGradBtn.addEventListener('click', () => setDotsGradientMode(true));
        
        DOM.bgSolidBtn.addEventListener('click', () => setBgGradientMode(false));
        DOM.bgGradBtn.addEventListener('click', () => setBgGradientMode(true));
        
        DOM.bgTransparentCheck.addEventListener('change', (e) => setBgTransparentMode(e.target.checked));

        // Logo Upload
        DOM.logoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                currentLogoUrl = event.target.result;
                updateLogoUI();
            };
            reader.readAsDataURL(file);
        });

        DOM.removeLogoBtn.addEventListener('click', () => {
            currentLogoUrl = null;
            updateLogoUI();
        });

        // Download
        DOM.downloadBtn.addEventListener('click', async () => {
            if (!isReady) return;
            
            // UI Loading state
            DOM.downloadBtn.disabled = true;
            DOM.downloadBtn.classList.add('opacity-50', 'cursor-not-allowed');
            DOM.downloadIcon.setAttribute('data-lucide', 'loader-2');
            DOM.downloadIcon.classList.add('animate-spin');
            DOM.downloadText.textContent = 'Generating...';
            lucide.createIcons(); // refresh icon

            try {
                const exportConfig = getQrConfig(Number(DOM.exportRes.value), true);
                const exportEngine = new QRCodeStyling(exportConfig);
                await exportEngine.download({ name: 'custom-qr-code', extension: 'png' });
            } catch (err) {
                console.error("Download failed", err);
            } finally {
                // Restore UI state
                DOM.downloadBtn.disabled = false;
                DOM.downloadBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                DOM.downloadIcon.setAttribute('data-lucide', 'download');
                DOM.downloadIcon.classList.remove('animate-spin');
                DOM.downloadText.textContent = 'Download Image';
                lucide.createIcons();
            }
        });

        // --- Init ---
        // Wait for external library to load
        const initInterval = setInterval(() => {
            if (window.QRCodeStyling) {
                clearInterval(initInterval);
                isReady = true;
                triggerUpdate();
            }
        }, 100);

    </script>
</body>
</html>
