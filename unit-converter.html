<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter | Tawing Tools</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .category-tab.active {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
        }
        .category-content { display: none; }
        .category-content.active { display: block; }
        
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }
        input[type=number] {
          -moz-appearance: textfield;
        }

        .loader {
            border-top-color: #2563eb;
            animation: spinner 0.6s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 font-sans selection:bg-blue-200 min-h-screen">
    
    <div class="max-w-4xl mx-auto p-6 md:p-12">
        
        <!-- Header -->
        <header class="mb-10">
            <a href="index.html" class="inline-flex items-center text-sm font-medium text-slate-400 hover:text-blue-600 transition-colors mb-6">
                <i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i> Back to Dashboard
            </a>
            <h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">Unit Converter</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-2">Accurate measurements and real-time global exchange rates.</p>
        </header>

        <!-- Category Selector -->
        <div class="flex flex-wrap gap-2 mb-8 bg-white dark:bg-slate-900 p-2 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
            <button onclick="switchCategory('currency')" id="tab-currency" class="category-tab active px-4 py-2 rounded-xl text-sm font-bold border border-transparent transition-all flex items-center gap-2">
                <i data-lucide="banknote" class="w-4 h-4"></i> Currency
            </button>
            <button onclick="switchCategory('length')" id="tab-length" class="category-tab px-4 py-2 rounded-xl text-sm font-bold border border-transparent text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all flex items-center gap-2">
                <i data-lucide="ruler" class="w-4 h-4"></i> Length
            </button>
            <button onclick="switchCategory('weight')" id="tab-weight" class="category-tab px-4 py-2 rounded-xl text-sm font-bold border border-transparent text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all flex items-center gap-2">
                <i data-lucide="weight" class="w-4 h-4"></i> Weight
            </button>
            <button onclick="switchCategory('temp')" id="tab-temp" class="category-tab px-4 py-2 rounded-xl text-sm font-bold border border-transparent text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all flex items-center gap-2">
                <i data-lucide="thermometer" class="w-4 h-4"></i> Temp
            </button>
        </div>

        <!-- Conversion Cards -->
        <div class="space-y-6">
            
            <!-- CURRENCY CONTENT -->
            <div id="content-currency" class="category-content active space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-3">
                        <div class="flex justify-between items-center">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">From</label>
                            <select id="cur-from-select" onchange="performCurrencyConversion()" class="bg-transparent text-xs font-bold text-blue-600 outline-none">
                                <option value="USD">USD - Dollar</option>
                                <option value="PHP" selected>PHP - Peso</option>
                                <option value="EUR">EUR - Euro</option>
                                <option value="JPY">JPY - Yen</option>
                                <option value="GBP">GBP - Pound</option>
                                <option value="SGD">SGD - Dollar</option>
                                <option value="KRW">KRW - Won</option>
                            </select>
                        </div>
                        <input type="number" id="cur-from-val" value="100" oninput="performCurrencyConversion()" class="w-full bg-transparent text-3xl font-light outline-none text-slate-800 dark:text-white" />
                    </div>
                    <div class="bg-blue-600 p-6 rounded-3xl shadow-lg shadow-blue-500/20 space-y-3">
                        <div class="flex justify-between items-center">
                            <label class="text-[10px] font-bold text-blue-200 uppercase tracking-widest">To</label>
                            <select id="cur-to-select" onchange="performCurrencyConversion()" class="bg-transparent text-xs font-bold text-white outline-none">
                                <option value="USD" selected>USD - Dollar</option>
                                <option value="PHP">PHP - Peso</option>
                                <option value="EUR">EUR - Euro</option>
                                <option value="JPY">JPY - Yen</option>
                                <option value="GBP">GBP - Pound</option>
                                <option value="SGD">SGD - Dollar</option>
                                <option value="KRW">KRW - Won</option>
                            </select>
                        </div>
                        <input type="number" id="cur-to-val" readonly class="w-full bg-transparent text-3xl font-light outline-none text-white" />
                    </div>
                </div>

                <!-- Rates Preview Section -->
                <section class="space-y-4">
                    <div class="flex items-center justify-between px-2">
                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-2">
                            <i data-lucide="trending-up" class="w-3 h-3"></i> Market Snapshot (1 USD)
                        </h3>
                        <div id="rate-status" class="flex items-center gap-2">
                            <div id="rate-loader" class="loader w-3 h-3 border-2 border-slate-200 rounded-full hidden"></div>
                            <p id="rate-text" class="text-[10px] text-slate-400 italic tracking-tight">Syncing...</p>
                            <button onclick="fetchLiveRates()" id="refreshBtn" class="text-blue-500 hover:text-blue-600 p-1 rounded-lg transition-colors">
                                <i data-lucide="refresh-cw" class="w-3 h-3"></i>
                            </button>
                        </div>
                    </div>
                    <div id="rates-preview-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3"></div>
                </section>
            </div>

            <!-- LENGTH CONTENT -->
            <div id="content-length" class="category-content space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-3 text-center">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Meters (m)</label>
                        <input type="number" id="len-m" value="1" oninput="convertLength('m')" class="w-full bg-transparent text-2xl font-light outline-none text-slate-800 dark:text-white text-center" />
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-3 text-center">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Feet (ft)</label>
                        <input type="number" id="len-ft" oninput="convertLength('ft')" class="w-full bg-transparent text-2xl font-light outline-none text-slate-800 dark:text-white text-center" />
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-3 text-center">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Inches (in)</label>
                        <input type="number" id="len-in" oninput="convertLength('in')" class="w-full bg-transparent text-2xl font-light outline-none text-slate-800 dark:text-white text-center" />
                    </div>
                </div>

                <!-- Visual Reference Section -->
                <section class="space-y-4">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-2 px-2">
                        <i data-lucide="box" class="w-3 h-3"></i> Visual Scale Reference
                    </h3>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        <button onclick="setLengthPreset(0.0856)" class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 p-4 rounded-2xl flex flex-col items-center gap-2 hover:border-blue-500 transition-all group">
                            <i data-lucide="credit-card" class="w-5 h-5 text-slate-400 group-hover:text-blue-500"></i>
                            <span class="text-[10px] font-bold text-slate-400 uppercase text-center leading-tight">Credit Card</span>
                            <span class="text-xs font-bold">8.56 cm</span>
                        </button>
                        <button onclick="setLengthPreset(0.3048)" class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 p-4 rounded-2xl flex flex-col items-center gap-2 hover:border-blue-500 transition-all group">
                            <i data-lucide="ruler" class="w-5 h-5 text-slate-400 group-hover:text-blue-500"></i>
                            <span class="text-[10px] font-bold text-slate-400 uppercase text-center leading-tight">1ft Ruler</span>
                            <span class="text-xs font-bold">30.48 cm</span>
                        </button>
                        <button onclick="setLengthPreset(2.0)" class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 p-4 rounded-2xl flex flex-col items-center gap-2 hover:border-blue-500 transition-all group">
                            <i data-lucide="door-open" class="w-5 h-5 text-slate-400 group-hover:text-blue-500"></i>
                            <span class="text-[10px] font-bold text-slate-400 uppercase text-center leading-tight">Door Height</span>
                            <span class="text-xs font-bold">2.0 m</span>
                        </button>
                        <button onclick="setLengthPreset(12.0)" class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 p-4 rounded-2xl flex flex-col items-center gap-2 hover:border-blue-500 transition-all group">
                            <i data-lucide="bus" class="w-5 h-5 text-slate-400 group-hover:text-blue-500"></i>
                            <span class="text-[10px] font-bold text-slate-400 uppercase text-center leading-tight">City Bus</span>
                            <span class="text-xs font-bold">12.0 m</span>
                        </button>
                    </div>
                </section>
            </div>

            <!-- WEIGHT CONTENT -->
            <div id="content-weight" class="category-content space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-3 text-center">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Kilograms (kg)</label>
                        <input type="number" id="wei-kg" value="1" oninput="convertWeight('kg')" class="w-full bg-transparent text-2xl font-light outline-none text-slate-800 dark:text-white text-center" />
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-3 text-center">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Pounds (lb)</label>
                        <input type="number" id="wei-lb" oninput="convertWeight('lb')" class="w-full bg-transparent text-2xl font-light outline-none text-slate-800 dark:text-white text-center" />
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-3 text-center">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Grams (g)</label>
                        <input type="number" id="wei-g" oninput="convertWeight('g')" class="w-full bg-transparent text-2xl font-light outline-none text-slate-800 dark:text-white text-center" />
                    </div>
                </div>

                <!-- Weight Visual Reference Section -->
                <section class="space-y-4">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-2 px-2">
                        <i data-lucide="scale" class="w-3 h-3"></i> Common Weight Reference
                    </h3>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        <button onclick="setWeightPreset(0.001)" class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 p-4 rounded-2xl flex flex-col items-center gap-2 hover:border-blue-500 transition-all group">
                            <i data-lucide="paperclip" class="w-5 h-5 text-slate-400 group-hover:text-blue-500"></i>
                            <span class="text-[10px] font-bold text-slate-400 uppercase text-center leading-tight">Paperclip</span>
                            <span class="text-xs font-bold">1.0 g</span>
                        </button>
                        <button onclick="setWeightPreset(0.2)" class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 p-4 rounded-2xl flex flex-col items-center gap-2 hover:border-blue-500 transition-all group">
                            <i data-lucide="smartphone" class="w-5 h-5 text-slate-400 group-hover:text-blue-500"></i>
                            <span class="text-[10px] font-bold text-slate-400 uppercase text-center leading-tight">Smartphone</span>
                            <span class="text-xs font-bold">200 g</span>
                        </button>
                        <button onclick="setWeightPreset(2.3)" class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 p-4 rounded-2xl flex flex-col items-center gap-2 hover:border-blue-500 transition-all group">
                            <i data-lucide="box" class="w-5 h-5 text-slate-400 group-hover:text-blue-500"></i>
                            <span class="text-[10px] font-bold text-slate-400 uppercase text-center leading-tight">Standard Brick</span>
                            <span class="text-xs font-bold">2.3 kg</span>
                        </button>
                        <button onclick="setWeightPreset(1200)" class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 p-4 rounded-2xl flex flex-col items-center gap-2 hover:border-blue-500 transition-all group">
                            <i data-lucide="car" class="w-5 h-5 text-slate-400 group-hover:text-blue-500"></i>
                            <span class="text-[10px] font-bold text-slate-400 uppercase text-center leading-tight">Compact Car</span>
                            <span class="text-xs font-bold">1200 kg</span>
                        </button>
                    </div>
                </section>
            </div>

            <!-- TEMP CONTENT -->
            <div id="content-temp" class="category-content space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-3 text-center">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Celsius (°C)</label>
                        <input type="number" id="tmp-c" value="0" oninput="convertTemp('c')" class="w-full bg-transparent text-3xl font-light outline-none text-slate-800 dark:text-white text-center" />
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-3 text-center">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Fahrenheit (°F)</label>
                        <input type="number" id="tmp-f" oninput="convertTemp('f')" class="w-full bg-transparent text-3xl font-light outline-none text-slate-800 dark:text-white text-center" />
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script>
        // --- State and Constants ---
        let exchangeRates = { "USD": 1, "PHP": 56.50, "EUR": 0.92, "JPY": 150.2, "GBP": 0.79, "SGD": 1.34, "KRW": 1332 };
        let isRatesLoading = false;

        // Scientific Conversion Constants
        const FT_TO_M = 0.3048; // Exact international definition
        const IN_TO_M = 0.0254; // Exact international definition
        const LB_TO_KG = 0.45359237; // Exact NIST definition

        // --- Init ---
        lucide.createIcons();
        if (localStorage.getItem('tawing_theme') === 'dark') document.documentElement.classList.add('dark');

        async function fetchLiveRates() {
            const statusText = document.getElementById('rate-text');
            const loader = document.getElementById('rate-loader');
            const refreshBtn = document.getElementById('refreshBtn');
            if (isRatesLoading) return;
            isRatesLoading = true;
            loader.classList.remove('hidden');
            refreshBtn.classList.add('animate-spin', 'pointer-events-none');
            statusText.textContent = "Syncing...";
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                if (!response.ok) throw new Error();
                const data = await response.json();
                if (data && data.rates) {
                    exchangeRates = data.rates;
                    statusText.textContent = `Updated ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                    statusText.classList.remove('text-red-400');
                    renderRatesPreview();
                    performCurrencyConversion();
                }
            } catch (error) {
                statusText.textContent = "Offline Data";
                statusText.classList.add('text-slate-400');
                renderRatesPreview();
            } finally {
                loader.classList.add('hidden');
                refreshBtn.classList.remove('animate-spin', 'pointer-events-none');
                isRatesLoading = false;
            }
        }

        function renderRatesPreview() {
            const grid = document.getElementById('rates-preview-grid');
            const currencies = [{ code: 'PHP', name: 'Peso' }, { code: 'EUR', name: 'Euro' }, { code: 'JPY', name: 'Yen' }, { code: 'GBP', name: 'Pound' }, { code: 'KRW', name: 'Won' }, { code: 'SGD', name: 'S-Dollar' }];
            grid.innerHTML = currencies.map(cur => `
                <div class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 p-3 rounded-2xl flex flex-col items-center gap-1 shadow-sm">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${cur.code}</span>
                    <span class="text-sm font-bold text-slate-800 dark:text-white">${exchangeRates[cur.code]?.toFixed(2) || '---'}</span>
                    <span class="text-[9px] text-slate-400 truncate">${cur.name}</span>
                </div>
            `).join('');
        }

        function switchCategory(cat) {
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.category-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
            document.getElementById('content-' + cat).classList.add('active');
            
            if (cat === 'currency') performCurrencyConversion();
            else if (cat === 'length') convertLength('m');
            else if (cat === 'weight') convertWeight('kg');
            else if (cat === 'temp') convertTemp('c');
        }

        function performCurrencyConversion() {
            const fromCode = document.getElementById('cur-from-select').value;
            const toCode = document.getElementById('cur-to-select').value;
            const fromVal = parseFloat(document.getElementById('cur-from-val').value) || 0;
            const toInput = document.getElementById('cur-to-val');
            if (!exchangeRates[fromCode] || !exchangeRates[toCode]) return;
            const result = (fromVal / exchangeRates[fromCode]) * exchangeRates[toCode];
            toInput.value = result.toFixed(2);
        }

        function setLengthPreset(meters) {
            document.getElementById('len-m').value = meters;
            convertLength('m');
        }

        function setWeightPreset(kg) {
            document.getElementById('wei-kg').value = kg;
            convertWeight('kg');
        }

        function convertLength(source) {
            const m = document.getElementById('len-m'), ft = document.getElementById('len-ft'), inch = document.getElementById('len-in');
            let val = parseFloat(document.getElementById('len-' + source).value) || 0, baseM;
            
            if (source === 'm') baseM = val;
            else if (source === 'ft') baseM = val * FT_TO_M;
            else if (source === 'in') baseM = val * IN_TO_M;
            
            if (source !== 'm') m.value = parseFloat(baseM.toFixed(6));
            if (source !== 'ft') ft.value = parseFloat((baseM / FT_TO_M).toFixed(6));
            if (source !== 'in') inch.value = parseFloat((baseM / IN_TO_M).toFixed(6));
        }

        function convertWeight(source) {
            const kg = document.getElementById('wei-kg'), lb = document.getElementById('wei-lb'), g = document.getElementById('wei-g');
            let val = parseFloat(document.getElementById('wei-' + source).value) || 0, baseKg;
            
            if (source === 'kg') baseKg = val;
            else if (source === 'lb') baseKg = val * LB_TO_KG;
            else if (source === 'g') baseKg = val / 1000;
            
            if (source !== 'kg') kg.value = parseFloat(baseKg.toFixed(6));
            if (source !== 'lb') lb.value = parseFloat((baseKg / LB_TO_KG).toFixed(6));
            if (source !== 'g') g.value = parseFloat((baseKg * 1000).toFixed(6));
        }

        function convertTemp(source) {
            const c = document.getElementById('tmp-c'), f = document.getElementById('tmp-f');
            let val = parseFloat(document.getElementById('tmp-' + source).value) || 0;
            if (source === 'c') f.value = parseFloat(((val * 9/5) + 32).toFixed(2));
            else c.value = parseFloat(((val - 32) * 5/9).toFixed(2));
        }

        window.onload = () => {
            fetchLiveRates();
            renderRatesPreview();
            convertLength('m');
            convertWeight('kg');
            convertTemp('c');
        };
    </script>
</body>
</html>
